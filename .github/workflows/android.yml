name: Android Build CI

# Sprint 8 / L5 — Upgraded CI/CD pipeline.
# Sprint 4 — added detekt + ktlint quality gate job.
# Sprint 9 — re-verified against upstream docs (July 2026) + real Sonar quality gate.
#
# Jobs (parallel where possible):
#  1. quality — detekt + ktlint static analysis (Sprint 4)
#  2. test — unit tests
#  3. lint — Android lint report
#  4. build — assemble debug APK + upload as artifact
#  5. sonarcloud — needs `test`, scans, then
#                  fails the pipeline if the Quality Gate is red.
#
# Action versions below are pinned to what's current as of July 2026:
#  - actions/checkout            v7   (GA June 17 2026; also blocks unsafe
#                                      fork-PR checkouts by default now)
#  - actions/setup-java          v5   (still current major; supports cache: gradle)
#  - gradle/actions/setup-gradle v6   (replaces manual actions/cache for Gradle —
#                                      handles dependency + build-cache + wrapper
#                                      validation in one step, faster & safer
#                                      than hashing gradle files by hand)
#  - actions/upload-artifact     v7
#  - actions/download-artifact   v8   (v7 upload pairs with v8 download)
#  - SonarSource/sonarqube-scan-action        v8  (uses Scanner CLI v8 / embedded JDK 21,
#                                                   GPG-verifies the scanner binary)
#  - SonarSource/sonarqube-quality-gate-action v1 (actually enforces the gate —
#                                                   this was missing before)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - audit-b2-fixes
      - B2
      - ui-optimization
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - audit-b2-fixes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality (detekt + ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run detekt
        run: ./gradlew detekt --stacktrace
      - name: Run ktlint
        run: ./gradlew ktlintCheck --stacktrace
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest --stacktrace
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run lint
        run: ./gradlew lintFossDebug --stacktrace
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  build:
    name: Build Debug APK (arm64-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build debug APK
        run: ./gradlew assembleFossDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: foss-debug-arm64-apk
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 14

  sonarcloud:
    name: SonarCloud Analysis + Quality Gate
    needs: test   # was missing before: sonar needs the coverage.xml from `test`
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # SonarCloud needs full history for PR decoration + new-code detection
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=pkok1099_photoz
            -Dsonar.coverage.exclusions=**/test/**,**/androidTest/**,**/*Test.kt,**/*Screen.kt,**/*Fragment.kt,**/*Activity.kt,**/*ViewModel.kt,**/ui/**,**/compose/**
      # This is the step that was actually missing before: without it, a red
      # gate on SonarCloud's side never fails the GitHub Action, so bad code
      # merges silently. pollingTimeoutSec caps how long/how many Action
      # minutes this step can burn waiting on the gate to compute.
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
