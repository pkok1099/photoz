name: Android Build CI

# Sprint 8 / L5 — Upgraded CI/CD pipeline.
#
# Runs on every push + PR to main. Three jobs (parallel where possible):
#  1. test — unit tests (./gradlew test)
#  2. lint — Android lint report
#  3. build — assemble debug APK + upload as artifact
#
# Improvements over the pre-Sprint-8 workflow:
#  - JDK 17 → 21 (matches the project's toolchain)
#  - Gradle + wrapper cache (cuts CI time from ~5min to ~2min on cache hit)
#  - Lint job (catches missing translations, unused resources, etc.)
#  - APK artifact upload (downloadable from the Actions run page)
#  - PR trigger (was push-only — now also runs on PRs to main)
#  - Path filter (skip CI for docs-only changes like README/ROADMAP edits)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-test-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-test-
      - name: Run unit tests
        run: ./gradlew test --stacktrace
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-lint-
      - name: Run lint
        run: ./gradlew lintFossDebug --stacktrace
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-
      - name: Build debug APK
        run: ./gradlew assembleFossDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: foss-debug-apk
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 14
