name: Android Build CI

# Sprint 8 / L5 — Upgraded CI/CD pipeline.
# Sprint 4 — added detekt + ktlint quality gate job.
#
# Runs on every push + PR to main. Four jobs (parallel where possible):
#  1. quality — detekt + ktlint static analysis (Sprint 4)
#  2. test — unit tests (./gradlew test)
#  3. lint — Android lint report
#  4. build — assemble debug APK + upload as artifact
#
# Improvements over the pre-Sprint-8 workflow:
#  - JDK 17 → 21 (matches the project's toolchain)
#  - Gradle + wrapper cache (cuts CI time from ~5min to ~2min on cache hit)
#  - Lint job (catches missing translations, unused resources, etc.)
#  - APK artifact upload (downloadable from the Actions run page)
#  - PR trigger (was push-only — now also runs on PRs to main)
#  - Path filter (skip CI for docs-only changes like README/ROADMAP edits)
#  - detekt + ktlint quality gate (Sprint 4 — catches code smells + style)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - audit-b2-fixes
      - B2
      - ui-optimization
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - audit-b2-fixes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality (detekt + ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Run detekt
        run: ./gradlew detekt --stacktrace
      - name: Run ktlint
        run: ./gradlew ktlintCheck --stacktrace
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest --stacktrace
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: app/build/reports/tests/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Run lint
        run: ./gradlew lintFossDebug --stacktrace
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  build:
    name: Build Debug APK (arm64-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Build debug APK
        run: ./gradlew assembleFossDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: foss-debug-arm64-apk
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 14
