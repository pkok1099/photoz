name: Build Rclone Gomobile for Android

# =============================================================================
# Sprint 8+ — Build rclone as gomobile shared library (AAR) for Android.
#
# This replaces the old EXEC binary approach. The AAR contains:
#   - jni/arm64-v8a/librclone.so (shared lib, loaded via dlopen)
#   - jni/armeabi-v7a/librclone.so
#   - classes.jar (Kotlin/Java bindings for RcloneRPC)
#
# gomobile produces a shared library loaded via System.loadLibrary()
# (dlopen), which is NOT blocked by Android 16 W^X policy.
# This allows useLegacyPackaging=false (needed for SQLCipher).
#
# Trigger: manual or tag push (rclone-v*).
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      rclone_version:
        description: 'Rclone version tag (e.g. v1.68.2)'
        required: true
        default: 'v1.68.2'
      commit_to_repo:
        description: 'Commit AAR to app/libs/ (true/false)'
        required: true
        default: 'true'
  push:
    tags:
      - 'rclone-v*'

permissions:
  contents: write

jobs:
  build-gomobile:
    name: Build rclone gomobile AAR (arm64 + arm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Determine rclone version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/rclone-v}"
            echo "version=v${TAG}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.rclone_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build rclone gomobile AAR
        env:
          RCLONE_VERSION: ${{ steps.version.outputs.version }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          chmod +x scripts/build-rclone-gomobile.sh
          bash scripts/build-rclone-gomobile.sh

      - name: Verify AAR
        run: |
          echo "=== AAR info ==="
          ls -lh app/libs/librclone.aar
          echo ""
          echo "=== Contents ==="
          unzip -l app/libs/librclone.aar | grep -E "\.so|\.class|classes"
          echo ""
          echo "=== 16KB alignment check ==="
          TMPDIR=$(mktemp -d)
          unzip -q app/libs/librclone.aar "jni/arm64-v8a/libgojni.so" -d "$TMPDIR"
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf \
            -l "$TMPDIR/jni/arm64-v8a/libgojni.so" | grep LOAD | head -1
          rm -rf "$TMPDIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: librclone-aar
          path: app/libs/librclone.aar
          retention-days: 90

      - name: Commit AAR to repo
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_to_repo == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f app/libs/librclone.aar
          git commit -m "chore: update rclone gomobile AAR (${{ steps.version.outputs.version }})

          Built with gomobile bind + NDK r27c.
          Shared library (dlopen, not exec) — W^X safe.
          Generated by GitHub Actions workflow: build-rclone-gomobile.yml" || echo "No changes to commit"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: rclone-gomobile-${{ steps.version.outputs.version }}
          name: rclone ${{ steps.version.outputs.version }} (gomobile AAR)
          body: |
            rclone ${{ steps.version.outputs.version }} built as gomobile AAR for Android.

            **Build configuration:**
            - gomobile bind (shared library, NOT executable)
            - Android NDK r27c (27.2.12479018)
            - API level 21
            - -tags android
            - -trimpath -ldflags "-s -w"
            - ABIs: arm64-v8a, armeabi-v7a

            **Installation:**
            1. Download `librclone.aar`
            2. Place in `app/libs/librclone.aar`
            3. Add to build.gradle.kts: `implementation(files("libs/librclone.aar"))`
          files: |
            app/libs/librclone.aar
          draft: false
          prerelease: false
