name: Build and Upload Signed Release

# Triggered by either:
#   1. Pushing a tag matching `v*.*.*` (e.g. v1.0.1) — automatic release
#   2. Manual dispatch (workflow_dispatch) with a version input
#
# Builds FOSS + Play release APKs (arm64-only), signs them with the release
# keystore stored in repository secrets, then creates a GitHub Release with
# the signed APKs attached.
#
# Action versions verified against upstream docs as of July 2026:
#  - actions/checkout            v7  (was v4 — also now fetch-depth: 0,
#                                     needed for `git describe`/`git log` below,
#                                     which fail silently on a shallow clone)
#  - actions/setup-java          v5
#  - softprops/action-gh-release v3  (was v2 — now supports generate_release_notes
#                                     natively, so we no longer need to hand-roll
#                                     release notes with git log)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to Build (e.g. 1.0.1)'
        required: true

# Grant write permission to create GitHub Release + push tag.
permissions:
  contents: write

jobs:
  release-process:
    runs-on: ubuntu-latest

    env:
      TELEMETRY_DECK_APP_ID: ${{ secrets.TELEMETRY_DECK_APP_ID }}
      # Keystore path is fixed; the workflow decodes the base64 secret to this location.
      # NOTE: `runner.temp` is not available in job-level env — use a fixed /tmp path.
      SIGNING_KEYSTORE_PATH: /tmp/photoz-release.keystore
      SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      # Checkout — fetch-depth: 0 is required so `git describe --tags` and
      # `git log <tag>..HEAD` below have full history to work with. With the
      # previous default (depth 1), both of those silently produced wrong
      # or empty output on a fresh runner.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Compute version string: tag name (minus leading 'v') if tag push, else input.
      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: tag is like "v1.0.1" -> version "1.0.1"
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag: v$VERSION)"

      # Setup JDK 21 (required for AGP 9.1.0 + Kotlin 2.4.0)
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      # Decode base64 keystore secret to a file. The keystore was generated
      # with keytool and base64-encoded; the secret holds the base64 string.
      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$SIGNING_KEYSTORE_PATH"
          echo "Keystore written to $SIGNING_KEYSTORE_PATH"
          ls -la "$SIGNING_KEYSTORE_PATH"
          # Sanity check: verify the keystore loads with the provided password.
          keytool -list -keystore "$SIGNING_KEYSTORE_PATH" \
            -storepass "$SIGNING_KEYSTORE_PASSWORD" \
            -alias "$SIGNING_KEY_ALIAS" | head -5

      # Build both release APKs in a single Gradle invocation. This lets the
      # Gradle daemon and configuration cache be reused across both variants
      # instead of doing a cold, separate invocation for each — noticeably
      # faster than two `./gradlew` calls when the variants share modules.
      - name: Build FOSS + Play Release APKs
        run: ./gradlew :app:assembleFossRelease :app:assemblePlayRelease --no-daemon --console=plain

      # Verify APK signatures (V1 + V2 + V3).
      # Resolve the installed build-tools version dynamically instead of
      # hardcoding e.g. "37.0.0" — GitHub-hosted runners' preinstalled SDK
      # version changes over time, and a hardcoded version silently breaks
      # this step the moment the runner image updates.
      - name: Verify APK signatures
        run: |
          BUILD_TOOLS_VERSION=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner"
          echo "Using apksigner from build-tools $BUILD_TOOLS_VERSION"
          for apk in app/build/outputs/apk/foss/release/*.apk app/build/outputs/apk/play/release/*.apk; do
            echo "=== $apk ==="
            "$APKSIGNER" verify --print-certs "$apk" | head -10
            echo "Size: $(du -h "$apk" | cut -f1)"
            echo
          done

      # Collect APKs into a staging directory with friendly names.
      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/foss/release/*.apk \
            release-artifacts/photok-${{ steps.version.outputs.version }}-foss-release-arm64.apk
          cp app/build/outputs/apk/play/release/*.apk \
            release-artifacts/photok-${{ steps.version.outputs.version }}-play-release-arm64.apk
          ls -la release-artifacts/

      # Create GitHub Release with APKs attached. If the release already
      # exists (e.g. manual dispatch after tag push), update it.
      # generate_release_notes uses GitHub's native compare-based changelog
      # (same one you'd get clicking "Generate release notes" in the UI)
      # instead of a hand-rolled `git log` script, which was fragile: it
      # assumed HEAD^ was always a tagged commit, which isn't true for a
      # workflow_dispatch run off an arbitrary branch/ref.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: PhotoZ ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
