name: Build Rclone for Android

# =============================================================================
# Sprint 8+ / L5 — CI/CD for rclone binary compilation.
#
# Builds rclone from source with CGO_ENABLED=1 + Android NDK + 16KB page
# alignment, then uploads the binary as a GitHub release asset. The app's
# build.gradle.kts picks up the binary from app/src/main/jniLibs/arm64-v8a/
# during APK assembly.
#
# Trigger: manual (workflow_dispatch) or on tag push (v*).
# The binary is uploaded as a release asset named:
#   librclone.so (arm64-v8a, CGO+NDK+16KB aligned)
#
# To use in the app:
#   1. Run this workflow (manual trigger or push a tag)
#   2. Download the librclone.so from the release
#   3. Place it in app/src/main/jniLibs/arm64-v8a/librclone.so
#   4. Rebuild the APK
#
# Or: the workflow can optionally commit the binary directly to the repo
# (triggered with "commit_to_repo" input = true).
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      rclone_version:
        description: 'Rclone version tag (e.g. v1.68.2)'
        required: true
        default: 'v1.68.2'
      commit_to_repo:
        description: 'Commit binary to app/src/main/jniLibs/ (true/false)'
        required: true
        default: 'true'
      create_release:
        description: 'Create GitHub release with binary (true/false)'
        required: true
        default: 'true'
  push:
    tags:
      - 'rclone-v*'

permissions:
  contents: write

jobs:
  build-rclone:
    name: Build rclone (arm64-v8a, CGO+NDK+16KB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Determine rclone version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push: rclone-v1.68.2 → v1.68.2
            TAG="${GITHUB_REF#refs/tags/rclone-v}"
            echo "version=v${TAG}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.rclone_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build rclone
        env:
          RCLONE_VERSION: ${{ steps.version.outputs.version }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          chmod +x scripts/build-rclone.sh
          bash scripts/build-rclone.sh

      - name: Verify binary
        run: |
          echo "=== Binary info ==="
          file app/src/main/jniLibs/arm64-v8a/librclone.so
          echo ""
          echo "=== Size ==="
          ls -lh app/src/main/jniLibs/arm64-v8a/librclone.so
          echo ""
          echo "=== 16KB alignment check ==="
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf \
            -l app/src/main/jniLibs/arm64-v8a/librclone.so | grep LOAD | head -1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librclone-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a/librclone.so
          retention-days: 90

      - name: Commit binary to repo
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_to_repo == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -f app/src/main/jniLibs/arm64-v8a/librclone.so
          git commit -m "chore: update rclone binary (${{ steps.version.outputs.version }}) — CI build

          Built with CGO_ENABLED=1 + NDK r27c + 16KB page alignment.
          Generated by GitHub Actions workflow: build-rclone.yml" || echo "No changes to commit"
          git push

      - name: Create GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: rclone-${{ steps.version.outputs.version }}
          name: rclone ${{ steps.version.outputs.version }} (Android arm64-v8a)
          body: |
            rclone ${{ steps.version.outputs.version }} built for Android arm64-v8a.

            **Build configuration:**
            - CGO_ENABLED=1 (cgo DNS resolver → Bionic getaddrinfo → Android netd)
            - Android NDK r27c (27.2.12479018)
            - 16KB page alignment (-Wl,-z,max-page-size=16384)
            - API level 21 (minSdk for modern NDK)
            - -tags android (disables systemd socket-activation, enables Android disk stats)
            - -trimpath -ldflags "-s" (stripped, reproducible)

            **Installation:**
            1. Download `librclone.so`
            2. Place in `app/src/main/jniLibs/arm64-v8a/librclone.so`
            3. Rebuild the APK
          files: |
            app/src/main/jniLibs/arm64-v8a/librclone.so
          draft: false
          prerelease: false
