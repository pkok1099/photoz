sonar.projectKey=pkok1099_photoz
sonar.organization=pkok1099
sonar.host.url=https://sonarcloud.io

# Android/Kotlin (Gradle) project — `app` module, foss flavor
sonar.projectName=photoz
sonar.sourceEncoding=UTF-8
sonar.language=kotlin

# Kotlin source + tests (no Android SDK needed for static analysis)
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
# Project is public → SonarCloud has unlimited LOC, so no exclusions needed.
# detekt/ktlint run separately in the `quality` job; the scanner does its own
# Kotlin analysis, so no reportPaths are set here.
# Vendored third-party code (bundled MP4 fast-start lib) is not project-authored
# Kotlin — exclude it from Sonar's static analysis.
sonar.exclusions=app/src/main/java/net/ypresto/**

