sonar.projectKey=pkok1099_photoz
sonar.organization=pkok1099
sonar.host.url=https://sonarcloud.io

# Android/Kotlin (Gradle) project — `app` module, foss flavor
sonar.projectName=photoz
sonar.sourceEncoding=UTF-8
sonar.language=kotlin

# Kotlin source + tests (no Android SDK needed for static analysis)
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
# Vendored third-party MP4 muxer (ypresto/qtfaststart fork) — not first-party code,
# plus docs/build/tooling that shouldn't be scanned as source.
sonar.exclusions=\
  app/src/main/java/net/**,\
  **/*.md,\
  **/*.json,\
  **/*.txt,\
  **/*.html,\
  **/build/**,\
  **/.gradle/**,\
  **/generated/**
sonar.kotlin.detekt.reportPaths=app/build/reports/detekt/*.xml
sonar.kotlin.ktlint.reportPaths=app/build/reports/ktlint/*.xml
